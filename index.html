<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .subscribe-button{
    background-color:red;
    color:white;
    width: 105px;
    height: 35px;
    border-radius: 3px;
    border:none;
    cursor: pointer;
}
.join-button{
    background-color:whitesmoke;
    color:blue;
    width: 105px;
    height: 35px;
    border-radius: 3px;
    border:rgb(34, 34, 240) solid 2px;
    cursor: pointer;
}
.tweet-button{
    background-color:blue;
    color:white;
    width: 105px;
    height: 35px;
    border-radius: 20px;
    border:none;
    cursor: pointer;
}
a {
    color: rgb(174, 199, 31);
    text-decoration: none;
    font-size: 25%;
}
.buy-button{
    background-color:black;
    color:white;
    width:50px;
    height: 23px;
    border:none;
    border-radius: 20px;
    cursor: pointer;
}
.download-button{
    background-color:green;
    color:white;
    width:100px;
    height: 23px;
    border:none;
    border-radius: 20px;
    cursor: pointer;
}
.shop-link{
    color: rgba(69, 79, 8, 0.84);
    text-decoration: none;
    font-size: 25px;
}
    </style>
</head>
<body>
   <button class="subscribe-button">SUBSCRIBE</button>
   <button class="join-button">JOIN</button>
   <button class="tweet-button">TWEET</button>
   <!-- shop amazon -->
    <br>
     <a href="https://www.amazon.com" target="_blank" class="shop-link">Shop Amazon</a>
    <p class="product-description">some description on products</p>
    <p class="product-price">price : 23$</p>
    <button class="buy-button">BUY</button>
    <button class="download-button">DOWNLOAD</button>

</body>
</html>
